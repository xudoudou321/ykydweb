<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场部常用链接</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background-color: #007BFF;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
        }
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-item {
            border-bottom: 1px solid #eee;
        }
        .link-item:last-child {
            border-bottom: none;
        }
        .link-item a {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: #333;
            border-left: 4px solid #007BFF;
            transition: background-color 0.2s;
        }
        .link-item a:active {
            background-color: #f0f8ff;
            color: #0056b3;
        }
        footer {
            text-align: center;
            padding: 15px;
            color: #999;
            font-size: 0.8em;
        }
    </style>
</head>
